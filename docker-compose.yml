version: '3.8'

services:
  cs-bot:
    build: .
    container_name: cs-bot
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ./knowledge_base:/app/knowledge_base:ro
      - ./memory:/app/memory
      - ./data:/app/data
